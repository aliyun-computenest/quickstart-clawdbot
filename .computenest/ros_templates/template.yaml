ROSTemplateFormatVersion: '2015-09-01'
Description:
  en: DockerCompose service template
  zh-cn: DockerComposeжңҚеҠЎжЁЎжқҝ
Locals:
  CurTime:
    Type: Eval
    Value:
      Fn::FormatTime:
        - '%Y%m%d-%H%M%S'
        - Asia/Shanghai
Conditions:
  CreateVpcConditions:
    Fn::Equals:
      - NewVPC
      - Ref: VpcOption
  EnablePublicIpConditions:
    Fn::Equals:
      - true
      - Ref: EnablePublicIp
  CreateDingTalkConditions:
    Fn::Equals:
      - true
      - Ref: CreateDingTalk
  EnableEnterpriseWeChatRobotConditions:
    Fn::Equals:
      - true
      - Ref: EnableEnterpriseWeChatRobot
  EnableQQRobotConditions:
    Fn::Equals:
      - true
      - Ref: EnableQQRobot
  EnableFeishuRobotConditions:
    Fn::Equals:
      - true
      - Ref: EnableFeishuRobot
Parameters:
  VpcOption:
    Type: String
    AllowedValues:
      - NewVPC
      - ExistingVPC
    AssociationPropertyMetadata:
      ValueLabelMapping:
        NewVPC:
          zh-cn: ж–°е»әдё“жңүзҪ‘з»ң
          en: New VPC
        ExistingVPC:
          zh-cn: е·Іжңүдё“жңүзҪ‘з»ң
          en: Existing VPC
    Label:
      en: Select Existing or New VPC
      zh-cn: йҖүжӢ©е·Іжңү/ж–°е»әзҡ„дё“жңүзҪ‘з»ң
    Required: true
    Default: NewVPC
  VpcCidrBlock:
    Type: String
    Label:
      en: VPC CIDR IPv4 Block
      zh-cn: дё“жңүзҪ‘з»ңIPv4зҪ‘ж®ө
    Description:
      zh-cn: VPCзҡ„ipең°еқҖж®өиҢғеӣҙпјҢ<br>жӮЁеҸҜд»ҘдҪҝз”Ёд»ҘдёӢзҡ„ipең°еқҖж®өжҲ–е…¶еӯҗзҪ‘:<br><font color='green'>[10.0.0.0/8]</font><br><font color='green'>[172.16.0.0/12]</font><br><font color='green'>[192.168.0.0/16]</font>
      en: 'The ip address range of the VPC in the CidrBlock form; <br>You can use the following ip address ranges and their subnets: <br><font color=''green''>[10.0.0.0/8]</font><br><font color=''green''>[172.16.0.0/12]</font><br><font color=''green''>[192.168.0.0/16]</font>'
    Default: 192.168.0.0/16
    Required:
      Fn::Equals:
        - NewVPC
        - ${VpcOption}
    AssociationProperty: ALIYUN::VPC::VPC::CidrBlock
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  VSwitchCidrBlock:
    Type: String
    Label:
      en: VSwitch CIDR Block
      zh-cn: дәӨжҚўжңәеӯҗзҪ‘зҪ‘ж®ө
    Description:
      zh-cn: еҝ…йЎ»еұһдәҺVPCзҡ„еӯҗзҪ‘ж®өгҖӮ
      en: Must belong to the subnet segment of VPC.
    Default: 192.168.1.0/24
    Required:
      Fn::Equals:
        - NewVPC
        - ${VpcOption}
    AssociationProperty: ALIYUN::VPC::VSwitch::CidrBlock
    AssociationPropertyMetadata:
      VpcCidrBlock: VpcCidrBlock
      Visible:
        Condition:
          Fn::Equals:
            - NewVPC
            - ${VpcOption}
  PayType:
    Type: String
    Label:
      en: ECS Instance Charge Type
      zh-cn: д»ҳиҙ№зұ»еһӢ
    Default: PostPaid
    AllowedValues:
      - PostPaid
      - PrePaid
    AssociationProperty: ChargeType
    AssociationPropertyMetadata:
      LocaleKey: InstanceChargeType
  PayPeriodUnit:
    Type: String
    Label:
      en: Pay Period Unit
      zh-cn: иҙӯд№°иө„жәҗж—¶й•ҝе‘Ёжңҹ
    Default: Month
    AllowedValues:
      - Month
      - Year
    AssociationProperty: PayPeriodUnit
    AssociationPropertyMetadata:
      ValueLabelMapping:
        Month: жңҲ
      Visible:
        Condition:
          Fn::Not:
            Fn::Equals:
              - ${PayType}
              - PostPaid
  PayPeriod:
    Type: Number
    Label:
      en: Period
      zh-cn: иҙӯд№°иө„жәҗж—¶й•ҝ
    Default: 1
    AllowedValues:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      - 9
    AssociationProperty: PayPeriod
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Not:
            Fn::Equals:
              - ${PayType}
              - PostPaid
  EcsInstanceType:
    Type: String
    Label:
      en: Instance Type
      zh-cn: е®һдҫӢзұ»еһӢ
    AssociationProperty: ALIYUN::ECS::Instance::InstanceType
    AssociationPropertyMetadata:
      InstanceChargeType: ${PayType}
      Constraints:
        InstanceTypeFamily:
          - ecs.u1
          - ecs.e
          - ecs.u2a
          - ecs.u2i
    AllowedValues:
      - ecs.e-c1m1.large
      - ecs.e-c1m2.large
      - ecs.e-c1m1.xlarge
      - ecs.e-c1m2.xlarge
      - ecs.u2a-c1m2.xlarge
      - ecs.u2i-c1m1.large
      - ecs.u2i-c1m2.large
      - ecs.u2i-c1m4.large
      - ecs.u2i-c1m8.large
      - ecs.u2i-c1m1.xlarge
      - ecs.u2i-c1m2.xlarge
      - ecs.u2i-c1m4.xlarge
      - ecs.u2i-c1m8.xlarge
      - ecs.u2i-c1m1.2xlarge
      - ecs.u2i-c1m2.2xlarge

  InstancePassword:
    NoEcho: true
    Type: String
    Description:
      en: Server login password, Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in)
      zh-cn: жңҚеҠЎеҷЁзҷ»еҪ•еҜҶз Ғ,й•ҝеәҰ8-30пјҢеҝ…йЎ»еҢ…еҗ«дёүйЎ№пјҲеӨ§еҶҷеӯ—жҜҚгҖҒе°ҸеҶҷеӯ—жҜҚгҖҒж•°еӯ—гҖҒ ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ дёӯзҡ„зү№ж®Ҡз¬ҰеҸ·пјү
    AllowedPattern: '^[a-zA-Z0-9-\(\)\`\~\!\@\#\$\%\^\&\*\_\-\+\=\|\{\}\[\]\:\;\<\>\,\.\?\/]*$'
    Label:
      en: Instance Password
      zh-cn: е®һдҫӢеҜҶз Ғ
    ConstraintDescription:
      en: Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in)
      zh-cn: й•ҝеәҰ8-30пјҢеҝ…йЎ»еҢ…еҗ«дёүйЎ№пјҲеӨ§еҶҷеӯ—жҜҚгҖҒе°ҸеҶҷеӯ—жҜҚгҖҒж•°еӯ—гҖҒ ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ дёӯзҡ„зү№ж®Ҡз¬ҰеҸ·пјү
    MinLength: 8
    MaxLength: 30
    AssociationProperty: ALIYUN::ECS::Instance::Password
  InternetChargeType:
    Type: String
    Label:
      zh-cn: еёҰе®Ҫд»ҳиҙ№зұ»еһӢ
      en: Internet Charge Type
    AssociationPropertyMetadata:
      ValueLabelMapping:
        PayByTraffic: жҢүжөҒйҮҸи®Ўиҙ№
        PayByBandwidth: жҢүеӣәе®ҡеёҰе®Ҫи®Ўиҙ№
    AllowedValues:
      - PayByBandwidth
      - PayByTraffic
    Default: PayByTraffic
  EnablePublicIp:
    Type: Boolean
    Label:
      en: Whether Enable Public IP
      zh-cn: жҳҜеҗҰејҖеҗҜе…¬зҪ‘IP
    Default: true
  ZoneId:
    Type: String
    Label:
      en: Zone ID
      zh-cn: еҸҜз”ЁеҢәID
    AssociationProperty: ALIYUN::ECS::Instance::ZoneId
  VpcId:
    Type: String
    Label:
      en: VPC ID
      zh-cn: дё“жңүзҪ‘з»ңVPCе®һдҫӢID
    AssociationProperty: 'ALIYUN::ECS::VPC::VPCId'
    Required:
      Fn::Equals:
        - ExistingVPC
        - ${VpcOption}
    Default: ''
    AssociationPropertyMetadata:
      AutoSelectFirst: true
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  VSwitchId:
    Type: String
    Label:
      en: VSwitch ID
      zh-cn: дәӨжҚўжңәе®һдҫӢID
    Default: ''
    Required:
      Fn::Equals:
        - ExistingVPC
        - ${VpcOption}
    AssociationProperty: 'ALIYUN::ECS::VSwitch::VSwitchId'
    AssociationPropertyMetadata:
      AutoSelectFirst: true
      VpcId: ${VpcId}
      ZoneId: ${ZoneId}
      Visible:
        Condition:
          Fn::Equals:
            - ExistingVPC
            - ${VpcOption}
  BaiLianApiKey:
    NoEcho: true
    Type: String
    Description:
      zh-cn: ејҖйҖҡзҷҫзӮјжЁЎеһӢжңҚеҠЎпјҢе№¶иҺ·еҫ— API-KEYгҖӮиҜ·еҸӮиҖғпјҡ <a href="https://developer.aliyun.com/article/1655158"  target="_blank">иҺ·еҸ–зҷҫзӮјAPI-KEY</a>гҖӮ
      en: 'Activate BaiLian and obtain the API-KEY. Please refer to:  <a href="https://developer.aliyun.com/article/1655158"  target="_blank">Get BaiLian API-KEY</a>.'
    Label:
      zh-cn: зҷҫзӮј API-KEY
      en: BaiLian API-KEY
    AssociationProperty: ALIYUN::Bailian::ApiKey::ApiKeyInfo
  CreateDingTalk:
    Type: Boolean
    Label:
      en: Enable DingTalk application link Moltbot
      zh-cn: еҗҜз”Ёй’үй’үеә”з”ЁиҝһжҺҘ Moltbot
    Description:
      en: >-
        Please See <a href="https://computenest.console.aliyun.com/service/detail/cn-hangzhou/service-249322bfe8c045798808?isInstance=true" target="_blank">How to Configure a Dingtalk App</a>
      zh-cn: >-
        иҜ·еҸӮиҖғпјҡ<a href="https://computenest.console.aliyun.com/service/detail/cn-hangzhou/service-249322bfe8c045798808?isInstance=true" target="_blank">еҰӮдҪ•й…ҚзҪ®й’үй’үеә”з”Ё</a>
    Default: false
  DingTalkClientId:
    Type: String
    Label:
      en: DingTalk Client ID
      zh-cn: й’үй’ү Client ID
    Description:
      en: >-
        Visit the application management page of DingTalk Open Platform.
        After selecting a specific application, select Credentials and Basic Information
        in the left menu to view the Client ID.
      zh-cn: >-
        и®ҝй—®<a href="https://open-dev.dingtalk.com/fe/app?hash=%23%2Fcorp%2Fapp#/corp/app"
        target="_blank">й’үй’үејҖж”ҫе№іеҸ°зҡ„еә”з”Ёз®ЎзҗҶ</a>йЎөйқўпјҢйҖүжӢ©е…·дҪ“зҡ„еә”з”ЁеҗҺпјҢеңЁе·Ұдҫ§иҸңеҚ•йҖүжӢ© <span style="color: black;
        font-weight: bold;">еҮӯиҜҒдёҺеҹәзЎҖдҝЎжҒҜ</span> жҹҘзңӢ Client IDгҖӮ
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - true
            - ${CreateDingTalk}
    Default: ''
  DingTalkClientSecret:
    Type: String
    NoEcho: true
    Label:
      en: DingTalk Client Secret
      zh-cn: й’үй’ү Client Secret
    Description:
      en: >-
        Visit the application management page of DingTalk Open Platform.
        After selecting a specific application, select Credentials and Basic Information
        in the left menu to view the Client Secret.
      zh-cn: >-
        и®ҝй—®<a href="https://open-dev.dingtalk.com/fe/app?hash=%23%2Fcorp%2Fapp#/corp/app"
        target="_blank">й’үй’үејҖж”ҫе№іеҸ°зҡ„еә”з”Ёз®ЎзҗҶ</a>йЎөйқўпјҢйҖүжӢ©е…·дҪ“зҡ„еә”з”ЁеҗҺпјҢеңЁе·Ұдҫ§иҸңеҚ•йҖүжӢ© <span style="color: black;
        font-weight: bold;">еҮӯиҜҒдёҺеҹәзЎҖдҝЎжҒҜ</span> жҹҘзңӢ Client SecretгҖӮ
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - true
            - ${CreateDingTalk}
    Default: ''
  EnableEnterpriseWeChatRobot:
    Type: Boolean
    Label:
      en: Enable Enterprise WeChat Robot
      zh-cn: еҗҜз”ЁдјҒдёҡеҫ®дҝЎжңәеҷЁдәә
    Default: false
    Description:
      en: >-
        Please See <a href="https://computenest.console.aliyun.com/service/detail/cn-hangzhou/service-249322bfe8c045798808?isInstance=true" target="_blank">How to Configure a WeChat Work Robot</a>
      zh-cn: >-
        иҜ·еҸӮиҖғпјҡ<a href="https://computenest.console.aliyun.com/service/detail/cn-hangzhou/service-249322bfe8c045798808?isInstance=true" target="_blank">еҰӮдҪ•й…ҚзҪ®дјҒдёҡеҫ®дҝЎжңәеҷЁдәә</a>
  EnterpriseWeChatRobotToken:
    Type: String
    Label:
      en: Enterprise WeChat Robot Token
      zh-cn: дјҒдёҡеҫ®дҝЎжңәеҷЁдәә Token
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - true
            - ${EnableEnterpriseWeChatRobot}
    Default: ''
  EnterpriseWeChatRobotEncodingAESKey:
    Type: String
    Label:
      en: Enterprise WeChat Robot EncodingAESKey
      zh-cn: дјҒдёҡеҫ®дҝЎжңәеҷЁдәә EncodingAESKey
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - true
            - ${EnableEnterpriseWeChatRobot}
    Default: ''
  EnableQQRobot:
    Type: Boolean
    Label:
      en: Enable QQ Robot
      zh-cn: еҗҜз”ЁQQжңәеҷЁдәә
    Default: false
    Description:
      en: >-
        Please See <a href="https://computenest.console.aliyun.com/service/detail/cn-hangzhou/service-249322bfe8c045798808?isInstance=true" target="_blank">How to Configure a QQ Robot</a>
      zh-cn: >-
        иҜ·еҸӮиҖғпјҡ<a href="https://computenest.console.aliyun.com/service/detail/cn-hangzhou/service-249322bfe8c045798808?isInstance=true" target="_blank">еҰӮдҪ•й…ҚзҪ®QQжңәеҷЁдәә</a>
  QQRobotAppId:
    Type: String
    Label:
      en: QQ Robot App ID
      zh-cn: QQжңәеҷЁдәә App ID
    Description:
      en: >-
        The App ID of the QQ Robot application.
      zh-cn: >-
        QQжңәеҷЁдәәеә”з”Ёзҡ„ App IDгҖӮ
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - true
            - ${EnableQQRobot}
    Default: ''
  QQRobotClientSecret:
    Type: String
    NoEcho: true
    Label:
      en: QQ Robot Client Secret
      zh-cn: QQжңәеҷЁдәә Client Secret
    Description:
      en: >-
        The Client Secret of the QQ Robot application.
      zh-cn: >-
        QQжңәеҷЁдәәеә”з”Ёзҡ„ Client SecretгҖӮ
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - true
            - ${EnableQQRobot}
    Default: ''
  EnableFeishuRobot:
    Type: Boolean
    Label:
      en: Enable Feishu Robot
      zh-cn: еҗҜз”ЁйЈһд№ҰжңәеҷЁдәә
    Default: false
    Description:
      en: >-
        Please See <a href="https://computenest.console.aliyun.com/service/detail/cn-hangzhou/service-249322bfe8c045798808?isInstance=true" target="_blank">How to Configure a Feishu Robot</a>
      zh-cn: >-
        иҜ·еҸӮиҖғпјҡ<a href="https://computenest.console.aliyun.com/service/detail/cn-hangzhou/service-249322bfe8c045798808?isInstance=true" target="_blank">еҰӮдҪ•й…ҚзҪ®йЈһд№ҰжңәеҷЁдәә</a>
  FeishuRobotAppId:
    Type: String
    Label:
      en: Feishu Robot App ID
      zh-cn: йЈһд№ҰжңәеҷЁдәә App ID
    Description:
      en: >-
        Visit the Feishu Open Platform to create an application and obtain the App ID.
      zh-cn: >-
        и®ҝй—®<a href="https://open.feishu.cn/app" target="_blank">йЈһд№ҰејҖж”ҫе№іеҸ°</a>еҲӣе»әеә”з”ЁеҗҺиҺ·еҸ– App IDгҖӮ
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - true
            - ${EnableFeishuRobot}
    Default: ''
  FeishuRobotAppSecret:
    Type: String
    NoEcho: true
    Label:
      en: Feishu Robot App Secret
      zh-cn: йЈһд№ҰжңәеҷЁдәә App Secret
    Description:
      en: >-
        Visit the Feishu Open Platform to create an application and obtain the App Secret.
      zh-cn: >-
        и®ҝй—®<a href="https://open.feishu.cn/app" target="_blank">йЈһд№ҰејҖж”ҫе№іеҸ°</a>еҲӣе»әеә”з”ЁеҗҺиҺ·еҸ– App SecretгҖӮ
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - true
            - ${EnableFeishuRobot}
    Default: ''
Resources:
  # ж–°е»әvpc
  EcsVpc:
    Type: ALIYUN::ECS::VPC
    Condition: CreateVpcConditions
    Properties:
      VpcName:
        Ref: ALIYUN::StackName
      CidrBlock:
        Ref: VpcCidrBlock
  # ж–°е»әvswitch
  EcsVSwitch:
    Condition: CreateVpcConditions
    Type: ALIYUN::ECS::VSwitch
    Properties:
      VSwitchName:
        Ref: ALIYUN::StackName
      VpcId:
        Ref: EcsVpc
      ZoneId:
        Ref: ZoneId
      CidrBlock:
        Ref: VSwitchCidrBlock
  SecurityGroup:
    Type: ALIYUN::ECS::SecurityGroup
    Properties:
      SecurityGroupName:
        Ref: ALIYUN::StackName
      VpcId:
        Fn::If:
          - CreateVpcConditions
          - Ref: EcsVpc
          - Ref: VpcId
      SecurityGroupIngress:
        - PortRange: 22/22
          Priority: 1
          SourceCidrIp: 0.0.0.0/0
          IpProtocol: tcp
          NicType: internet
        - PortRange: 18789/18790
          Priority: 1
          SourceCidrIp: 0.0.0.0/0
          IpProtocol: tcp
          NicType: internet
  InstanceGroup:
    Type: ALIYUN::ECS::InstanceGroup
    Properties:
      # д»ҳиҙ№зұ»еһӢ
      InstanceChargeType:
        Ref: PayType
      PeriodUnit:
        Ref: PayPeriodUnit
      Period:
        Ref: PayPeriod
      VpcId:
        Fn::If:
          - CreateVpcConditions
          - Ref: EcsVpc
          - Ref: VpcId
      VSwitchId:
        'Fn::If':
          - CreateVpcConditions
          - Ref: EcsVSwitch
          - Ref: VSwitchId
      ZoneId:
        Ref: ZoneId
      SecurityGroupId:
        Ref: SecurityGroup
      ImageId: m-j6c6qq3wujq6zyx87kh4
      Password:
        Ref: InstancePassword
      InstanceType:
        Ref: EcsInstanceType
      SystemDiskCategory: cloud_essd_entry
      SystemDiskSize: 40
      InternetMaxBandwidthOut:
        Fn::If:
          - EnablePublicIpConditions
          - 3
          - 0
      IoOptimized: optimized
      MaxAmount: 1
      InternetChargeType:
        Ref: InternetChargeType
  RunInstallCommand:
    Type: ALIYUN::ECS::RunCommand
    Properties:
      InstanceIds:
        Fn::GetAtt:
        - InstanceGroup
        - InstanceIds
      Type: RunShellScript
      Sync: true
      Timeout: 3600
      CommandContent:
        Fn::Sub:
          - |
            #!/bin/bash
            NEW_API_KEY=${ApiKey}
            Site="domestic"
            NEW_PORT="18789"
            CONFIG_FILE="/home/admin/.openclaw/openclaw.json"
            OLD_PORT=$(jq -r '.gateway.port // empty' "$CONFIG_FILE")
            sed -i -E -e "s|(:[[:space:]]*)$OLD_PORT([,}])|\1$NEW_PORT\2|g" -e "s|:$OLD_PORT\"|:$NEW_PORT\"|g" "$CONFIG_FILE"
            sh /opt/.swas/run-cmd.sh config "${!NEW_API_KEY}" "${!Site}" > /dev/null
            sh /opt/.swas/run-cmd.sh restart
            sleep 30

          - ApiKey:
              Fn::Select:
                - ApiKeyValue
                - Ref: BaiLianApiKey
  EnableDingtalkRobotByRunCommand:
    Type: ALIYUN::ECS::RunCommand
    Condition: CreateDingTalkConditions
    DependsOn: RunInstallCommand
    Properties:
      InstanceIds:
        Fn::GetAtt:
        - InstanceGroup
        - InstanceIds
      Type: RunShellScript
      Sync: true
      Timeout: 3600
      CommandContent:
        Fn::Sub:
          - |
            #!/bin/bash
            APP_ID=${DingTalkClientId}
            APP_SECRET=${DingTalkClientSecret}
            sh /opt/.swas/run-cmd.sh set-channel dingtalk "${!APP_ID}" "${!APP_SECRET}" > /dev/null
            sh /opt/.swas/run-cmd.sh restart
            echo "OpenClawй…ҚзҪ®жҲҗеҠҹ."

          - DingTalkClientId:
              Ref: DingTalkClientId
            DingTalkClientSecret:
              Ref: DingTalkClientSecret
  EnableEnterpriseWeChatRobotByRunCommand:
    Type: ALIYUN::ECS::RunCommand
    Condition: EnableEnterpriseWeChatRobotConditions
    DependsOn: RunInstallCommand
    Properties:
      InstanceIds:
        Fn::GetAtt:
        - InstanceGroup
        - InstanceIds
      Type: RunShellScript
